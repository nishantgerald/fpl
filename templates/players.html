<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css">
    <script src="/static/js/players.js" defer></script>
</head>

<body style="font-family: 'Arial', sans-serif; background-color: #f4f5f7; color: #333;">
    <header class="app-header" style="background-color: #37003c; color: white; padding: 15px 20px; text-align: center;">
        <h1>FPL App</h1>
    </header>

    <!-- Include Navigation Bar -->
    {% include "navbar.html" %}

    <!-- Page Title -->
    <div style="text-align: center; margin: 20px;">
        <h1 style="color: #37003c; font-size: 2rem;">Player Search</h1>
    </div>

    <!-- Filter Inputs -->
    <div id="filters" class="filters" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
        <div>
            <label for="teamFilter" style="display: block; font-weight: bold; margin-bottom: 5px;">Team:</label>
            <select id="teamFilter" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <option value="">All Teams</option>
            </select>
        </div>

        <div>
            <label for="positionFilter" style="display: block; font-weight: bold; margin-bottom: 5px;">Position:</label>
            <select id="positionFilter" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <option value="">All Positions</option>
                <option value="GKP">Goalkeeper</option>
                <option value="DEF">Defender</option>
                <option value="MID">Midfielder</option>
                <option value="FWD">Forward</option>
            </select>
        </div>

        <div>
            <label for="minPrice" style="display: block; font-weight: bold; margin-bottom: 5px;">Price (£):</label>
            <input type="number" id="minPrice" placeholder="Min" step="0.1" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 80px;">
            <input type="number" id="maxPrice" placeholder="Max" step="0.1" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 80px;">
        </div>

        <div>
            <label for="minForm" style="display: block; font-weight: bold; margin-bottom: 5px;">Form:</label>
            <input type="number" id="minForm" placeholder="Min" step="0.1" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 80px;">
        </div>

        <div>
            <label for="statusFilter" style="display: block; font-weight: bold; margin-bottom: 5px;">Status:</label>
            <select id="statusFilter" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <option value="">All Status</option>
                <option value="Available">Available</option>
                <option value="Injured">Injured</option>
                <option value="Doubtful">Doubtful</option>
                <option value="Suspended">Suspended</option>
                <option value="Unavailable">Unavailable</option>
            </select>
        </div>
    </div>

    <!-- Players Table -->
    <div style="padding: 0 20px;">
        <table id="playersTable" class="display" style="width: 100%; border-collapse: collapse; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
            <thead style="background-color: #37003c; color: white;">
                <tr>
                    <th style="padding: 10px; text-align: left;">Name</th>
                    <th style="padding: 10px; text-align: left;">Team</th>
                    <th style="padding: 10px; text-align: left;">Position</th>
                    <th style="padding: 10px; text-align: left;">Price (£)</th>
                    <th style="padding: 10px; text-align: left;">Total Points</th>
                    <th style="padding: 10px; text-align: left;">Form</th>
                    <th style="padding: 10px; text-align: left;">Selected By (%)</th>
                    <th style="padding: 10px; text-align: left;">Status</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be dynamically loaded -->
            </tbody>
        </table>
    </div>
</body>

</html>
