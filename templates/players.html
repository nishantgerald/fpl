<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Table</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css">
</head>

<body>
    <h1>All Players</h1>

    <!-- Filter inputs -->
    <div id="filters">
        <label for="teamFilter">Team:</label>
        <select id="teamFilter">
            <option value="">All Teams</option>
            <option value="Liverpool">Liverpool</option>
            <option value="Manchester City">Manchester City</option>
            <!-- Add more team options dynamically -->
        </select>

        <label for="positionFilter">Position:</label>
        <select id="positionFilter">
            <option value="">All Positions</option>
            <option value="GKP">Goalkeeper</option>
            <option value="DEF">Defender</option>
            <option value="MID">Midfielder</option>
            <option value="FWD">Forward</option>
        </select>

        <label for="statusFilter">Status:</label>
        <select id="statusFilter">
            <option value="">All Status</option>
            <option value="Available">Available</option>
            <option value="Injured">Injured</option>
            <option value="Doubtful">Doubtful</option>
            <option value="Suspended">Suspended</option>
            <option value="Unavailable">Unavailable</option>
        </select>

        <label for="minPrice">Price (£):</label>
        <input type="number" id="minPrice" placeholder="Min" step="0.1">
        <input type="number" id="maxPrice" placeholder="Max" step="0.1">

        <label for="minForm">Form:</label>
        <input type="number" id="minForm" placeholder="Min" step="0.1">
    </div>

    <table id="playersTable" class="display">
        <thead>
            <tr>
                <th>Name</th>
                <th>Team</th>
                <th>Position</th>
                <th>Price (£)</th>
                <th>Total Points</th>
                <th>Form</th>
                <th>Selected By (%)</th>
                <th>Status</th>
            </tr>
        </thead>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <script src="/static/js/players.js"></script>
</body>

</html>
