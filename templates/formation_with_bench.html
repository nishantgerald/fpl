<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        async function showPlayerStats(playerId) {
            const response = await fetch(`/player-stats/${playerId}`);
            const data = await response.json();
            if (response.ok) {
                const modalContent = `
                    <div class="player-header">
                        <img src="${data.photo}" alt="${data.name}" class="player-image">
                        <div class="player-details">
                            <span class="player-position">${data.position}</span>
                            <h2 class="player-name">${data.name}</h2>
                            <span class="player-team">${data.team}</span>
                        </div>
                    </div>
                    <div class="player-stats">
                        <div class="stat">
                            <span class="stat-label">Price</span>
                            <span class="stat-value">£${data.price}m</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Form</span>
                            <span class="stat-value">${data.form}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Points</span>
                            <span class="stat-value">${data.total_points}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Bonus</span>
                            <span class="stat-value">${data.bonus || 0}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Selected by</span>
                            <span class="stat-value">${data.selected_by_percent}%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Status</span>
                            <span class="stat-value">${data.status}</span>
                        </div>
                    </div>
                `;
                document.getElementById("modal-body").innerHTML = modalContent;
                document.getElementById("modal").style.display = "block";
            } else {
                alert("Failed to fetch player stats.");
            }
        }
    
        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>
</head>

<body>
    <header class="app-header">
        <h1>FPL App</h1>
    </header>
    <div class="tabs">
        <button class="tab-button active">My Team</button>
    </div>
    <div class="field">
        {% for position, players in starting_lineup.items() %}
        <div class="row">
            {% for player in players %}
            <div class="player">
                <img src="{{ player.photo }}" alt="{{ player.name }}">
                <span>{{ player.name }}</span>
                <button class="info-button" onclick="showPlayerStats('{{ player.id }}')">i</button>
                {% if player.is_captain %}
                <div class="badge">C</div>
                {% elif player.is_vice_captain %}
                <div class="badge vc-badge">VC</div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
    <div class="bench-container">
        <h2>Bench</h2>
        <div class="bench">
            {% for player in bench %}
            <div class="player">
                <img src="{{ player.photo }}" alt="{{ player.name }}">
                <span>{{ player.name }}</span>
                <button class="info-button" onclick="showPlayerStats('{{ player.id }}')">i</button>
            </div>
            {% endfor %}
        </div>
    </div>
    <div id="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000;">
        <div class="modal-content">
            <button onclick="closeModal()" class="close-button">&times;</button>
            <div id="modal-body">
                <!-- Content will be dynamically injected here -->
            </div>
        </div>
    </div>
</body>

</html>
