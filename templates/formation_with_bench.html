<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/scripts.js" defer></script>
</head>

<body>
    <header class="app-header">
        <h1>FPL App</h1>
    </header>

    <!-- User ID Input Section -->
<div class="user-id-search">
    <form action="/" method="get" class="search-form">
        <label for="user_id" class="search-label">Enter User ID:</label>
        <div class="search-group">
            <input 
                type="number" 
                id="user_id" 
                name="user_id" 
                value="{{ user_id }}" 
                min="1" 
                placeholder="3022850" 
                class="search-input" 
                required>
            <button type="submit" class="search-button">Update Team</button>
        </div>
    </form>
</div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-button active">My Team</button>
    </div>

    <!-- Team Formation -->
    <div class="field">
        {% for position, players in starting_lineup.items() %}
        <div class="row">
            {% for player in players %}
            <div class="player">
                <img src="{{ player.photo }}" alt="{{ player.name }}">
                <span>{{ player.name }}</span>
                <button class="info-button" onclick="showPlayerStats('{{ player.id }}')">i</button>
                {% if player.is_captain %}
                <div class="badge">C</div>
                {% elif player.is_vice_captain %}
                <div class="badge vc-badge">VC</div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        {% endfor %}
    </div>

    <!-- Bench Section -->
    <div class="bench-container">
        <h2>Bench</h2>
        <div class="bench">
            {% for player in bench %}
            <div class="player">
                <img src="{{ player.photo }}" alt="{{ player.name }}">
                <span>{{ player.name }}</span>
                <button class="info-button" onclick="showPlayerStats('{{ player.id }}')">i</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Modal for Player Stats -->
    <div id="modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000;">
        <div class="modal-content">
            <button onclick="closeModal()" class="close-button">&times;</button>
            <div id="modal-body">
                <!-- Content will be dynamically injected here -->
            </div>
        </div>
    </div>
</body>

</html>
